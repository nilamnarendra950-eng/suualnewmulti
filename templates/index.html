<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJAL HAWK 2026 - SESSION ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }
        .card {
            background: rgba(0, 255, 0, 0.08);
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 25px;
        }
        input, textarea {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
        }
        .console {
            background: #000;
            color: #0f0;
            height: 520px;
            overflow-y: auto;
            padding: 15px;
            border: 2px solid #0f0;
            font-size: 13px;
        }
        .btn-success {
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
        }
        .btn-danger {
            background: #f00;
            color: #fff;
            border: none;
            font-weight: bold;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        h1 {
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body class="p-4">
<div class="container">
    <h1 class="text-center display-4 mb-4">SUJAL HAWK 2026 - SESSION ID</h1>
    
    <div class="text-center mb-4">
        <span id="status" class="badge bg-secondary fs-3 px-5 py-2">STOPPED</span>
        <span class="badge bg-success fs-3 mx-3">SENT: <span id="sent">0</span></span>
        <span class="badge bg-info fs-3">UPTIME: <span id="uptime">00:00:00</span></span>
    </div>

    <form id="form" class="card mb-4">
        <div class="row g-3">
            
            <!-- Session IDs -->
            <div class="col-12">
                <label class="form-label">Session IDs (1 per line, max 5)</label>
                <textarea name="sessionids" class="form-control" rows="4" placeholder="3702652591%3A0OZenrGtwFTYE0%3A24%3AAYhRx_LMn2uPgQeZQKbN4KPO9iKNfZI0yEqn7jEvZQ&#10;71345342817%3ADs1tbujVMD5wwy%3A7%3AAYgoXuWuQmmpfIorccSo5Af0mNbsfU3mPIEcOYg-0Q&#10;..." required></textarea>
            </div>
            
            <!-- Thread ID -->
            <div class="col-12">
                <label class="form-label">Thread ID (Single Group)</label>
                <input name="thread_id" class="form-control" placeholder="Enter Single Thread ID" required>
            </div>
            
            <!-- Name Bases -->
            <div class="col-12">
                <label class="form-label">Name Bases (Multi NC - 1 per line)</label>
                <textarea name="name_bases" class="form-control" rows="3" placeholder="AYUSH RANDIKE&#10;PRABHAT CHUDAKKAD&#10;BEN BHAINGE&#10;..."></textarea>
            </div>
            
            <!-- Messages -->
            <div class="col-12">
                <label class="form-label">Messages (1 per line)</label>
                <textarea name="messages" class="form-control" rows="5" placeholder="Your long spam messages..." required></textarea>
            </div>
            
            <!-- Delays -->
            <div class="col-md-3">
                <label class="form-label">Message Delay (sec)</label>
                <input name="message_delay" type="number" step="0.1" class="form-control" value="50">
            </div>
            <div class="col-md-3">
                <label class="form-label">Name Change Delay (sec)</label>
                <input name="name_change_delay" type="number" step="0.1" class="form-control" value="6">
            </div>
            <div class="col-md-3">
                <label class="form-label">Account Switch Delay (sec)</label>
                <input name="switch_delay" type="number" step="0.1" class="form-control" value="4">
            </div>
            <div class="col-md-3">
                <label class="form-label">Cycle Break (sec)</label>
                <input name="cycle_break" type="number" class="form-control" value="420">
            </div>
            
        </div>
        
        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success btn-lg px-5">START (Session ID)</button>
            <button type="button" onclick="fetch('/stop').then(update)" class="btn btn-danger btn-lg px-5 ms-3">STOP</button>
        </div>
    </form>

    <div class="card">
        <h3 class="text-center">LIVE CONSOLE (RAM + CPU + IST + Hybrid)</h3>
        <div id="console" class="console"></div>
    </div>
</div>

<script>
function update(){
    fetch("/status").then(r => r.json()).then(d => {
        document.getElementById("sent").innerText = d.sent;
        document.getElementById("uptime").innerText = d.uptime;
        document.getElementById("status").innerText = d.running ? "RUNNING" : "STOPPED";
        document.getElementById("status").className = d.running ? "badge bg-danger blink fs-3 px-5 py-2" : "badge bg-secondary fs-3 px-5 py-2";
        document.getElementById("console").innerHTML = d.logs.map(l => `<div>${l}</div>`).join("");
        document.getElementById("console").scrollTop = 999999;
    });
}

document.getElementById("form").onsubmit = e => {
    e.preventDefault();
    fetch("/start", {method: "POST", body: new FormData(e.target)}).then(update);
};

setInterval(update, 2000);
update();
</script>
</body>
</html>
